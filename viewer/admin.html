<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>คลังข้อสอบ — Admin Viewer (v1)</title>

<!-- KaTeX สำหรับ render LaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<!-- Image spec renderers (Phase B — port จาก portal) -->
<script defer src="renderers.js"></script>

<!-- Thai font: Sarabun -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f6f1e6;          /* parchment cream */
    --panel: #fbf7ee;       /* lighter cream */
    --ink: #2b2419;         /* warm dark */
    --ink-soft: #5a4f3d;
    --rule: #d9cfb8;
    --accent: #8b3a1f;      /* burnt sienna */
    --accent-soft: #e8d5c0;
    --ok: #4a6b3a;
    --warn: #b58200;
    --placeholder-bg: #fff4dc;
    --placeholder-border: #d9b86a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    height: 100%;
  }

  /* ===== Password gate ===== */
  #gate {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  #gate .card {
    background: var(--panel);
    border: 1px solid var(--rule);
    padding: 36px 40px;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 8px 24px rgba(43, 36, 25, 0.08);
  }
  #gate h1 {
    font-weight: 500;
    font-size: 20px;
    margin: 0 0 4px;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  #gate .sub {
    color: var(--ink-soft);
    font-size: 13px;
    margin-bottom: 22px;
  }
  #gate input[type=password] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--rule);
    background: #fff;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    outline: none;
  }
  #gate input[type=password]:focus { border-color: var(--accent); }
  #gate button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  #gate button:hover { background: #6f2d18; }
  #gate .err { color: var(--accent); font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* ===== Main layout (เปิดหลัง unlock) ===== */
  #app { display: none; height: 100vh; }
  #app.active { display: grid; grid-template-columns: 320px 1fr; }

  /* ===== Sidebar ===== */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    padding: 22px 18px;
  }
  aside header {
    border-bottom: 1px dashed var(--rule);
    padding-bottom: 14px;
    margin-bottom: 14px;
  }
  aside header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  aside header .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  .set-item {
    padding: 8px 10px;
    margin-bottom: 2px;
    cursor: pointer;
    border-left: 3px solid transparent;
    font-size: 14px;
    transition: background .15s ease;
  }
  .set-item:hover { background: var(--accent-soft); }
  .set-item.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .set-item .set-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .set-item .set-count {
    float: right;
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 8px;
  }

  /* ===== Sidebar sections (Phase 2: Set view + Chapter view) ===== */
  .sidebar-section {
    margin-bottom: 18px;
  }
  .sidebar-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    margin: 0 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px dashed var(--rule);
  }

  /* Chapter list item (mirror of .set-item but for primary-topic browsing) */
  .chapter-item {
    padding: 7px 10px;
    margin-bottom: 1px;
    cursor: pointer;
    border-left: 3px solid transparent;
    font-size: 13px;
    transition: background .15s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chapter-item:hover { background: var(--accent-soft); }
  .chapter-item.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .chapter-item .chapter-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    min-width: 22px;
    text-align: right;
  }
  .chapter-item .chapter-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .chapter-item .chapter-count {
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .chapter-item .chapter-count.zero {
    opacity: 0.4;
  }
  .chapter-item .chapter-count.loading {
    opacity: 0.5;
    font-style: italic;
  }

  /* ===== Tag chips (in Q-card summary) ===== */
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    flex-shrink: 0;
  }
  .tag-chip {
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    white-space: nowrap;
  }
  .tag-chip.primary {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  .tag-chip.sub {
    background: var(--bg);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
  }

  /* ===== Difficulty chips (Phase 4) ===== */
  .diff-chip {
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 8px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 500;
    white-space: nowrap;
  }
  .diff-chip.easy {
    background: #e6efdc;
    color: #4a6b3a;
    border: 1px solid #4a6b3a;
  }
  .diff-chip.med {
    background: #fff4dc;
    color: #8a6500;
    border: 1px solid #b58200;
  }
  .diff-chip.hard {
    background: #f8d7c8;
    color: #8b3a1f;
    border: 1px solid #8b3a1f;
  }
  /* Difficulty list item in sidebar */
  .diff-item {
    padding: 7px 10px;
    margin-bottom: 1px;
    cursor: pointer;
    border-left: 3px solid transparent;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .15s ease;
  }
  .diff-item:hover { background: var(--accent-soft); }
  .diff-item.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    font-weight: 500;
  }
  .diff-item .diff-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .diff-item .diff-dot.easy { background: #4a6b3a; }
  .diff-item .diff-dot.med  { background: #b58200; }
  .diff-item .diff-dot.hard { background: #8b3a1f; }
  .diff-item .diff-name { flex: 1; }
  .diff-item .diff-count {
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 8px;
  }
  .diff-item .diff-count.zero { opacity: 0.4; }
  .diff-item .diff-count.loading { opacity: 0.5; font-style: italic; }

  /* Set-prefix badge (shown only in chapter view to disambiguate source) */
  .set-prefix {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    background: var(--bg);
    padding: 1px 6px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    flex-shrink: 0;
  }

  /* ===== Phase 3: Tag editor ===== */
  /* Modified Q-card indicator */
  .q-card.modified {
    border-left: 3px solid var(--accent);
  }
  .q-card.modified > summary::after {
    content: " · แก้แล้ว";
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
  }

  /* Edit-tags button inside Q-body */
  .edit-tags-section {
    margin: 12px 0;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px dashed var(--rule);
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .edit-tags-section .current-tags {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    font-size: 13px;
  }
  .edit-tags-section .current-tags .label {
    color: var(--ink-soft);
    margin-right: 4px;
  }
  .edit-tags-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 5px 12px;
    background: var(--accent-soft);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s ease;
  }
  .edit-tags-btn:hover {
    background: var(--accent);
    color: white;
  }

  /* Export bar (top of sidebar, only when pending changes exist) */
  .export-bar {
    margin-bottom: 14px;
    padding: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 6px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .export-bar .export-btn {
    flex: 1;
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: 500;
  }
  .export-bar .export-btn:hover { opacity: 0.9; }
  .export-bar .discard-btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 6px 9px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    cursor: pointer;
  }
  .export-bar .discard-btn:hover {
    background: var(--accent);
    color: white;
  }

  /* Modal overlay */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal[hidden] { display: none; }
  .modal-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(40, 30, 20, 0.55);
    backdrop-filter: blur(2px);
  }
  .modal-content {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--rule);
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .modal-content h3 {
    margin: 0 0 4px;
    font-size: 18px;
    color: var(--ink);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .modal-content h3 .close-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: var(--ink-soft);
    padding: 0 8px;
  }
  .modal-content h3 .close-btn:hover { color: var(--accent); }
  .modal-content .qid-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .modal-content .question-preview {
    padding: 12px 14px;
    background: var(--bg);
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 18px;
    max-height: 140px;
    overflow-y: auto;
  }
  .modal-content section { margin-bottom: 18px; }
  .modal-content section h4 {
    font-size: 13px;
    margin: 0 0 8px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .modal-content section h4 .hint {
    color: var(--ink-soft);
    font-weight: 400;
    font-size: 11px;
    margin-left: 6px;
  }
  .tag-selector {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag-toggle {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 5px 11px;
    border-radius: 14px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--ink);
    cursor: pointer;
    transition: all .15s ease;
  }
  .tag-toggle:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .tag-toggle.primary.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    font-weight: 500;
  }
  .tag-toggle.sub.selected {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .tag-toggle:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--rule);
  }
  .modal-footer button {
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    padding: 7px 18px;
    border-radius: 6px;
    cursor: pointer;
  }
  .modal-footer .btn-cancel {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
  }
  .modal-footer .btn-save {
    background: var(--accent);
    color: white;
    border: 1px solid var(--accent);
    font-weight: 500;
  }
  .modal-footer .btn-save:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .modal-footer .btn-cancel:hover { background: var(--bg); }
  .modal-footer .btn-save:not(:disabled):hover { opacity: 0.9; }

  /* ===== Main content ===== */
  main {
    overflow-y: auto;
    padding: 28px 36px 60px;
  }
  main.empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    font-style: italic;
  }

  .set-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px;
    margin-bottom: 18px;
  }
  .set-header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 700;
  }
  .set-header .set-meta {
    font-size: 13px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Question list (accordion) */
  .q-list { margin-top: 8px; }
  .q-card {
    border: 1px solid var(--rule);
    background: var(--panel);
    margin-bottom: 10px;
  }
  .q-card > summary {
    list-style: none;
    cursor: pointer;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .q-card > summary::-webkit-details-marker { display: none; }
  .q-card > summary::before {
    content: '▸';
    color: var(--ink-soft);
    font-size: 11px;
    transition: transform .15s ease;
    display: inline-block;
  }
  .q-card[open] > summary::before { transform: rotate(90deg); }
  .q-card > summary:hover { background: var(--accent-soft); }

  .q-num {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
  }
  .q-preview {
    flex: 1;
    color: var(--ink);
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .q-badges { display: flex; gap: 4px; flex-shrink: 0; }
  .badge {
    font-size: 10px;
    padding: 1px 7px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 8px;
    color: var(--ink-soft);
    font-family: 'IBM Plex Mono', monospace;
  }
  .badge.img { background: var(--placeholder-bg); border-color: var(--placeholder-border); color: var(--warn); }
  .badge.type { color: var(--accent); border-color: var(--accent-soft); }

  .q-body {
    padding: 4px 24px 20px;
    border-top: 1px dashed var(--rule);
  }
  .q-section {
    margin-top: 16px;
  }
  .q-section h4 {
    margin: 0 0 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    font-weight: 700;
  }
  .q-question { font-size: 15px; line-height: 1.7; white-space: pre-line; }
  .choices { margin: 0; padding-left: 22px; }
  .choices li { margin-bottom: 4px; }
  .choices li.correct {
    color: var(--ok);
    font-weight: 500;
  }
  .choices li.correct::after {
    content: ' ✓';
    color: var(--ok);
  }
  .correct-fill {
    font-family: 'IBM Plex Mono', monospace;
    background: #e6efdc;
    padding: 2px 8px;
    border-left: 3px solid var(--ok);
    display: inline-block;
  }
  .explanation { background: #fff; padding: 10px 14px; border: 1px solid var(--rule); }
  .explanation > div { margin: 4px 0; }

  /* imageSpec — rendered SVG (Phase B) */
  .img-rendered {
    background: #fff;
    border: 1px solid var(--rule);
    padding: 12px 14px;
    display: inline-block;
    max-width: 100%;
    overflow-x: auto;
  }
  .img-rendered svg { display: block; max-width: 100%; height: auto; }

  /* Inline image inside explanation (Phase E — [IMAGE] marker) */
  .img-inline {
    margin: 10px 0;
    text-align: center;
  }
  .img-inline svg {
    display: inline-block;
    max-width: 100%;
    height: auto;
    background: #fff;
    border: 1px solid var(--rule);
    padding: 8px 10px;
  }
  .img-inline-span {
    display: inline-block;
    vertical-align: middle;
    margin: 0 4px;
  }
  .img-inline-missing {
    color: var(--warn);
    font-style: italic;
    font-size: 13px;
  }

  /* imageSpec placeholder card */
  .imgspec-placeholder {
    background: var(--placeholder-bg);
    border: 1px dashed var(--placeholder-border);
    padding: 12px 14px;
  }
  .imgspec-placeholder .label {
    font-size: 12px;
    color: var(--warn);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }
  .imgspec-placeholder .type-pill {
    display: inline-block;
    background: #fff;
    border: 1px solid var(--placeholder-border);
    padding: 2px 10px;
    margin-top: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--accent);
  }
  .imgspec-placeholder details { margin-top: 8px; }
  .imgspec-placeholder summary {
    cursor: pointer;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .imgspec-placeholder pre {
    background: #fff;
    border: 1px solid var(--rule);
    padding: 8px 10px;
    margin-top: 6px;
    font-size: 11px;
    overflow-x: auto;
    font-family: 'IBM Plex Mono', monospace;
  }
  .imgnote {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 6px;
  }

  /* Error / status */
  .status {
    padding: 14px 18px;
    border-left: 4px solid var(--accent);
    background: var(--accent-soft);
    margin-bottom: 16px;
    font-size: 14px;
  }
  .status code {
    font-family: 'IBM Plex Mono', monospace;
    background: #fff;
    padding: 1px 5px;
  }
  /* ตารางในโจทย์ (tables field) */
  .q-table {
    border-collapse: collapse;
    margin: 8px 0;
    background: #fff;
    font-size: 14px;
  }
  .q-table th, .q-table td {
    border: 1px solid var(--rule);
    padding: 5px 14px;
    text-align: center;
  }
  .q-table th {
    background: var(--accent-soft);
    font-weight: 500;
    color: var(--ink);
  }
  .table-caption {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- ============ Password gate ============ -->
<div id="gate">
  <div class="card">
    <h1>คลังข้อสอบ · Admin Viewer</h1>
    <div class="sub">ใส่รหัสเพื่อเข้าใช้งาน</div>
    <input type="password" id="pw" placeholder="password" autofocus>
    <button id="unlock">เข้าสู่ระบบ</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- ============ Main app ============ -->
<div id="app">
  <aside>
    <header>
      <h2>คลังข้อสอบคณิต ม.ปลาย</h2>
      <div class="meta" id="bankMeta">กำลังโหลด…</div>
    </header>
    <div id="exportBar" class="export-bar" hidden>
      <button class="export-btn" onclick="exportChanges()">
        📥 Export Changes (<span id="changeCount">0</span>)
      </button>
      <button class="discard-btn" onclick="discardAllChanges()" title="ยกเลิกการแก้ทั้งหมด">↺</button>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-section-title">ดูตาม Set</h3>
      <div id="setList"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-section-title">ดูตามบท</h3>
      <div id="chapterList"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-section-title">ดูตามความยาก</h3>
      <div id="difficultyList"></div>
    </div>
  </aside>
  <main class="empty" id="content">
    เลือกชุดข้อสอบจากด้านซ้าย
  </main>
</div>

<!-- Phase 3: Tag editor modal -->
<div id="tagEditModal" class="modal" hidden>
  <div class="modal-overlay" onclick="closeTagEditor()"></div>
  <div class="modal-content">
    <h3>
      <span>แก้ Tag</span>
      <button class="close-btn" onclick="closeTagEditor()" title="ปิด (Esc)">✕</button>
    </h3>
    <div class="qid-label" id="tagEditQid"></div>
    <div class="question-preview" id="tagEditQuestion"></div>

    <section>
      <h4>Primary tag <span class="hint">(1-2 บท — ใช้ filter ตามบท)</span></h4>
      <div class="tag-selector" id="primarySelector"></div>
    </section>

    <section>
      <h4>Secondary tags <span class="hint">(0+ บท — แสดงเป็น chip รอง)</span></h4>
      <div class="tag-selector" id="secondarySelector"></div>
    </section>

    <section>
      <h4>ระดับความยาก <span class="hint">(ง่าย / ปานกลาง / ยาก)</span></h4>
      <div class="tag-selector" id="difficultySelector"></div>
    </section>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeTagEditor()">ยกเลิก</button>
      <button class="btn-save" id="tagEditSaveBtn" onclick="saveTagEditor()">บันทึก</button>
    </div>
  </div>
</div>

<script>
  // ============ Password gate ============
  const PASSWORD = 'teacher2026';
  const gate = document.getElementById('gate');
  const app = document.getElementById('app');
  const pwInput = document.getElementById('pw');
  const errEl = document.getElementById('err');

  function tryUnlock() {
    if (pwInput.value === PASSWORD) {
      gate.style.display = 'none';
      app.classList.add('active');
      loadBank();
    } else {
      errEl.textContent = 'รหัสไม่ถูกต้อง';
      pwInput.value = '';
      pwInput.focus();
    }
  }
  document.getElementById('unlock').addEventListener('click', tryUnlock);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

  // ============ Load bank ============
  let MANIFEST = null;
  const LOADED_SETS = {};   // cache: sid → {setId, questions}
  let CURRENT_SET = null;
  let CURRENT_CHAPTER = null;   // Phase 2: state for chapter view
  let CURRENT_DIFFICULTY = null;  // Phase 4: state for difficulty view
  let ALL_LOADED = false;       // true once every set file has been fetched
  let LOAD_ALL_PROMISE = null;  // memoize the background eager-load promise

  // Synthesize stable q.id from setId + questionNumber (JSON files don't include it)
  function normalizeSet(set) {
    if (!set || !Array.isArray(set.questions)) return set;
    const sid = set.setId || 'unknown';
    set.questions.forEach(q => {
      if (!q.id) q.id = `${sid}:Q${String(q.questionNumber).padStart(2,'0')}`;
    });
    return set;
  }

  // ============ Phase 3: Tag editor state ============
  // qId → {topics: [...], subTopics: [...], difficulty?: '...'}  (only differences from original)
  const PENDING_CHANGES = new Map();
  const LS_KEY = 'math-bank:pending-tag-changes';
  let EDITING_QID = null;
  let EDITING_PRIMARY = new Set();   // selected primary chapter IDs (1-2)
  let EDITING_SUB = new Set();       // selected secondary chapter IDs
  let EDITING_DIFFICULTY = null;     // Phase 4: 'ง่าย' | 'ปานกลาง' | 'ยาก' | null

  function loadPendingFromStorage() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const obj = JSON.parse(raw);
      Object.entries(obj).forEach(([qid, tags]) => {
        PENDING_CHANGES.set(qid, tags);
      });
    } catch (e) {
      console.warn('Failed to load pending changes from localStorage', e);
    }
  }

  function savePendingToStorage() {
    try {
      const obj = {};
      PENDING_CHANGES.forEach((tags, qid) => { obj[qid] = tags; });
      if (Object.keys(obj).length === 0) {
        localStorage.removeItem(LS_KEY);
      } else {
        localStorage.setItem(LS_KEY, JSON.stringify(obj));
      }
    } catch (e) {
      console.warn('Failed to save pending changes to localStorage', e);
    }
  }

  // Return effective tags for a question (pending change if any, else original)
  function getEffectiveTags(q) {
    const orig = { topics: q.topics || [], subTopics: q.subTopics || [], difficulty: q.difficulty || null };
    if (PENDING_CHANGES.has(q.id)) {
      const p = PENDING_CHANGES.get(q.id);
      return {
        topics: p.topics !== undefined ? p.topics : orig.topics,
        subTopics: p.subTopics !== undefined ? p.subTopics : orig.subTopics,
        difficulty: p.difficulty !== undefined ? p.difficulty : orig.difficulty,
      };
    }
    return orig;
  }

  function findQuestionById(qid) {
    for (const set of Object.values(LOADED_SETS)) {
      const found = (set.questions || []).find(q => q.id === qid);
      if (found) return found;
    }
    return null;
  }

  async function loadBank() {
    const meta = document.getElementById('bankMeta');
    try {
      // path สัมพัทธ์: viewer/admin.html → ../data/manifest.json
      const res = await fetch('../data/manifest.json', { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      MANIFEST = await res.json();
      meta.textContent = `schema v${MANIFEST.schemaVersion} · exported ${MANIFEST.exported}`;
      // Phase 3: restore pending changes from localStorage + update bar
      loadPendingFromStorage();
      updateExportBar();
      renderSetList();
      renderChapterList();
      renderDifficultyList();
      // Background eager-load all sets so chapter counts populate
      // (lazy-load benefit สำหรับ set view ยังคงอยู่ — เพราะ set view ไม่ต้องรอ)
      ensureAllSetsLoaded();
    } catch (e) {
      meta.textContent = 'โหลดไม่สำเร็จ';
      document.getElementById('content').innerHTML = `
        <div style="max-width:600px">
          <div class="status">
            <strong>โหลด manifest ไม่สำเร็จ</strong><br>
            <code>${e.message}</code><br><br>
            ตรวจสอบ:
            <ul>
              <li>ไฟล์ <code>data/manifest.json</code> อยู่ที่ root ของ project</li>
              <li>เปิดด้วย local server (เช่น <code>python -m http.server</code>) ไม่ใช่ <code>file://</code></li>
              <li>เปิดผ่าน URL เช่น <code>http://localhost:8000/viewer/admin.html</code></li>
            </ul>
          </div>
        </div>`;
      document.getElementById('content').classList.remove('empty');
    }
  }

  // ============ Sidebar: set list ============
  function renderSetList() {
    const sets = MANIFEST.sets || {};

    // เรียง setId ตามลำดับใน manifest (Object.keys preserve insertion order)
    const setIds = Object.keys(sets);

    const html = setIds.map(sid => {
      const s = sets[sid];
      const n = s.totalQuestions || 0;
      const label = setLabel(s);
      return `
        <div class="set-item" data-setid="${sid}">
          <span class="set-count">${n}</span>
          <div>${label}</div>
          <div class="set-id">${sid}</div>
        </div>`;
    }).join('');

    document.getElementById('setList').innerHTML = html;

    document.querySelectorAll('.set-item').forEach(el => {
      el.addEventListener('click', () => selectSet(el.dataset.setid));
    });
  }

  // ============ Sidebar: chapter list (Phase 2) ============
  // แสดงรายการ 15 บท พร้อม count ของข้อที่มี chapter เป็น PRIMARY tag (q.topics)
  // ข้อที่มีบทเป็น SECONDARY (q.subTopics) จะไม่ถูกนับ — ป้องกัน spam
  function renderChapterList() {
    const topicNames = (MANIFEST && MANIFEST.topicNames) || {};
    const chapterIds = Object.keys(topicNames).sort((a, b) => Number(a) - Number(b));

    const html = chapterIds.map(chId => {
      const name = topicNames[chId];
      const placeholder = ALL_LOADED ? '0' : '…';
      const cls = ALL_LOADED ? '' : ' loading';
      return `
        <div class="chapter-item" data-chid="${chId}">
          <span class="chapter-num">${chId}.</span>
          <div class="chapter-name">${name}</div>
          <span class="chapter-count${cls}">${placeholder}</span>
        </div>`;
    }).join('');

    document.getElementById('chapterList').innerHTML = html;
    document.querySelectorAll('.chapter-item').forEach(el => {
      el.addEventListener('click', () => selectChapter(el.dataset.chid));
    });

    if (ALL_LOADED) updateChapterCounts();
  }

  // ============ Phase 4: Difficulty list (sidebar) ============
  const DIFF_LEVELS = [
    { key: 'ง่าย',     cls: 'easy' },
    { key: 'ปานกลาง', cls: 'med'  },
    { key: 'ยาก',     cls: 'hard' },
  ];

  function diffClass(level) {
    if (level === 'ง่าย') return 'easy';
    if (level === 'ยาก') return 'hard';
    if (level === 'ปานกลาง') return 'med';
    return '';
  }

  function renderDifficultyList() {
    const html = DIFF_LEVELS.map(d => {
      const placeholder = ALL_LOADED ? '0' : '…';
      const cls = ALL_LOADED ? '' : ' loading';
      return `
        <div class="diff-item" data-diff="${d.key}">
          <span class="diff-dot ${d.cls}"></span>
          <span class="diff-name">${d.key}</span>
          <span class="diff-count${cls}">${placeholder}</span>
        </div>`;
    }).join('');
    document.getElementById('difficultyList').innerHTML = html;
    document.querySelectorAll('.diff-item').forEach(el => {
      el.addEventListener('click', () => selectDifficulty(el.dataset.diff));
    });
    if (ALL_LOADED) updateDifficultyCounts();
  }

  function updateDifficultyCounts() {
    const counts = { 'ง่าย': 0, 'ปานกลาง': 0, 'ยาก': 0 };
    Object.values(LOADED_SETS).forEach(set => {
      (set.questions || []).forEach(q => {
        const d = getEffectiveTags(q).difficulty;
        if (d in counts) counts[d]++;
      });
    });
    document.querySelectorAll('.diff-item').forEach(el => {
      const key = el.dataset.diff;
      const n = counts[key] || 0;
      const c = el.querySelector('.diff-count');
      if (c) {
        c.textContent = n;
        c.classList.remove('loading');
        c.classList.toggle('zero', n === 0);
      }
    });
  }

  function clearActiveDifficulty() {
    CURRENT_DIFFICULTY = null;
    document.querySelectorAll('.diff-item').forEach(el => el.classList.remove('active'));
  }

  async function selectDifficulty(diff) {
    CURRENT_DIFFICULTY = diff;
    clearActiveSet();
    clearActiveChapter();
    document.querySelectorAll('.diff-item').forEach(el => {
      el.classList.toggle('active', el.dataset.diff === diff);
    });
    const main = document.getElementById('content');
    if (!ALL_LOADED) {
      main.classList.remove('empty');
      main.innerHTML = `
        <div class="set-header">
          <h1>ระดับความยาก: ${diff}</h1>
          <div class="set-meta">กำลังโหลดข้อสอบทุก set…</div>
        </div>`;
      await ensureAllSetsLoaded();
      if (CURRENT_DIFFICULTY !== diff) return;
    }
    const all = [];
    Object.values(LOADED_SETS).forEach(set => (set.questions || []).forEach(q => all.push(q)));
    const qs = all
      .filter(q => getEffectiveTags(q).difficulty === diff)
      .sort((a, b) => {
        const aSet = a.setId || '';
        const bSet = b.setId || '';
        if (!a.setId) console.warn('[sort] Q missing setId:', a.id, 'Q#', a.questionNumber);
        if (aSet !== bSet) return aSet.localeCompare(bSet);
        return (a.questionNumber || 0) - (b.questionNumber || 0);
      });
    main.classList.remove('empty');
    main.innerHTML = `
      <div class="set-header">
        <h1>ระดับ: <span class="diff-chip ${diffClass(diff)}">${diff}</span></h1>
        <div class="set-meta">${qs.length} ข้อ · เรียงตาม set แล้ว Q#</div>
      </div>
      <div class="q-list">
        ${qs.map(q => renderQCard(q, { showSetPrefix: true })).join('')}
      </div>
    `;
    typeset(main);
  }
  async function ensureAllSetsLoaded() {
    if (ALL_LOADED) return;
    if (LOAD_ALL_PROMISE) return LOAD_ALL_PROMISE;
    LOAD_ALL_PROMISE = (async () => {
      const setIds = Object.keys((MANIFEST && MANIFEST.sets) || {});
      await Promise.all(setIds.map(async sid => {
        if (LOADED_SETS[sid]) return;
        try {
          const res = await fetch(`../data/sets/${sid}.json`, { cache: 'no-cache' });
          if (res.ok) LOADED_SETS[sid] = normalizeSet(await res.json());
        } catch (e) {
          console.error('Failed to load set', sid, e);
        }
      }));
      ALL_LOADED = true;
      updateChapterCounts();
      updateDifficultyCounts();
    })();
    return LOAD_ALL_PROMISE;
  }

  function updateChapterCounts() {
    const countByChapter = {};
    Object.values(LOADED_SETS).forEach(set => {
      (set.questions || []).forEach(q => {
        // Phase 3: count effective primary tags (apply pending changes)
        getEffectiveTags(q).topics.forEach(t => {
          countByChapter[t] = (countByChapter[t] || 0) + 1;
        });
      });
    });
    document.querySelectorAll('.chapter-item').forEach(el => {
      const chId = el.dataset.chid;
      const n = countByChapter[chId] || 0;
      const countEl = el.querySelector('.chapter-count');
      if (countEl) {
        countEl.textContent = n;
        countEl.classList.remove('loading');
        countEl.classList.toggle('zero', n === 0);
      }
    });
  }

  // ============ Helpers (Phase 2) ============
  function topicLabel(chId) {
    return (MANIFEST && MANIFEST.topicNames && MANIFEST.topicNames[chId]) || `บทที่ ${chId}`;
  }

  function clearActiveSet() {
    CURRENT_SET = null;
    document.querySelectorAll('.set-item').forEach(el => el.classList.remove('active'));
  }
  function clearActiveChapter() {
    CURRENT_CHAPTER = null;
    document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));
  }

  // ============ Main: render chapter view (Phase 2) ============
  // Filter ทุกข้อจากทุก set ที่มี chapter เป็น PRIMARY (q.topics.includes(chId))
  // ข้อที่ chapter เป็น secondary (subTopics) จะไม่ถูกแสดง
  async function selectChapter(chId) {
    CURRENT_CHAPTER = chId;
    clearActiveSet();
    clearActiveDifficulty();
    document.querySelectorAll('.chapter-item').forEach(el => {
      el.classList.toggle('active', el.dataset.chid === chId);
    });

    const main = document.getElementById('content');
    const name = topicLabel(chId);

    // Show loading if not all sets loaded yet
    if (!ALL_LOADED) {
      main.classList.remove('empty');
      main.innerHTML = `
        <div class="set-header">
          <h1>บท ${chId}: ${name}</h1>
          <div class="set-meta">กำลังโหลดข้อสอบทุก set…</div>
        </div>`;
      await ensureAllSetsLoaded();
      // Guard: ถ้า user เปลี่ยน selection ระหว่างที่ยังโหลด → abort
      if (CURRENT_CHAPTER !== chId) return;
    }

    // Collect all questions from all loaded sets
    const allQuestions = [];
    Object.values(LOADED_SETS).forEach(set => {
      (set.questions || []).forEach(q => allQuestions.push(q));
    });

    // Filter PRIMARY only, then sort by setId → questionNumber
    // Phase 3: use effective tags (apply pending changes)
    const qs = allQuestions
      .filter(q => getEffectiveTags(q).topics.includes(chId))
      .sort((a, b) => {
        const aSet = a.setId || '';
        const bSet = b.setId || '';
        if (!a.setId) console.warn('[sort] Q missing setId:', a.id, 'Q#', a.questionNumber);
        if (aSet !== bSet) return aSet.localeCompare(bSet);
        return (a.questionNumber || 0) - (b.questionNumber || 0);
      });

    const html = `
      <div class="set-header">
        <h1>บท ${chId}: ${name}</h1>
        <div class="set-meta">
          <code>chapter:${chId}</code> · ${qs.length} ข้อ
          · primary tag · เรียงตาม set แล้ว Q#
        </div>
      </div>
      <div class="q-list">
        ${qs.map(q => renderQCard(q, { showSetPrefix: true })).join('')}
      </div>
    `;
    main.classList.remove('empty');
    main.innerHTML = html;
    typeset(main);
  }

  // ============ Main: render set ============
  async function selectSet(sid) {
    CURRENT_SET = sid;
    clearActiveChapter();  // mutual exclusion กับ chapter view
    clearActiveDifficulty();
    document.querySelectorAll('.set-item').forEach(el => {
      el.classList.toggle('active', el.dataset.setid === sid);
    });

    const s = MANIFEST.sets[sid];
    const main = document.getElementById('content');

    // Show loading indicator (เฉพาะถ้ายังไม่เคยโหลด)
    if (!LOADED_SETS[sid]) {
      main.classList.remove('empty');
      main.innerHTML = `
        <div class="set-header">
          <h1>${setLabel(s)}</h1>
          <div class="set-meta"><code>${sid}</code> · กำลังโหลด…</div>
        </div>`;
      try {
        const res = await fetch(`../data/sets/${sid}.json`, { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        LOADED_SETS[sid] = normalizeSet(await res.json());
      } catch (e) {
        main.innerHTML = `
          <div class="set-header">
            <h1>${setLabel(s)}</h1>
            <div class="set-meta"><code>${sid}</code></div>
          </div>
          <div class="status">
            <strong>โหลด set ไม่สำเร็จ</strong><br>
            <code>${e.message}</code><br><br>
            ตรวจสอบว่าไฟล์ <code>data/sets/${sid}.json</code> มีอยู่จริง
          </div>`;
        return;
      }
    }

    // Guard: ถ้า user click set อื่นระหว่างที่ยังโหลด set นี้อยู่ → abort render
    if (CURRENT_SET !== sid) return;

    const qs = LOADED_SETS[sid].questions || [];

    const html = `
      <div class="set-header">
        <h1>${setLabel(s)}</h1>
        <div class="set-meta">
          <code>${sid}</code> · ${qs.length} ข้อ
          ${s.totalScore ? ` · ${s.totalScore} คะแนน` : ''}
          ${s.examDate && looksLikeDate(s.examDate) ? ' · สอบ ' + s.examDate : ''}
        </div>
      </div>
      <div class="q-list">
        ${qs.map(renderQCard).join('')}
      </div>
    `;
    main.classList.remove('empty');
    main.innerHTML = html;
    typeset(main);
  }

  // ============ Question card ============
  function renderQCard(q, opts) {
    opts = opts || {};
    const showSetPrefix = !!opts.showSetPrefix;
    const preview = (q.question || '').replace(/\$[^$]+\$/g, '◇').slice(0, 90);
    const hasImg = q.imageSpec || q.hasImage;
    const imgBadge = q.imageSpec
      ? `<span class="badge img">imageSpec</span>`
      : (q.hasImage ? `<span class="badge img">hasImage</span>` : '');

    // Tag chips: primary (topics) + secondary (subTopics)
    // Phase 3: use effective tags (apply pending changes)
    const tags = getEffectiveTags(q);
    const primaryTopics = tags.topics;
    const subTopics = tags.subTopics;
    const difficulty = tags.difficulty;
    const isModified = PENDING_CHANGES.has(q.id);
    const primaryChips = primaryTopics.map(t =>
      `<span class="tag-chip primary" title="${escapeHtml(topicLabel(t))}">บท ${t}</span>`
    ).join('');
    const subChips = subTopics.map(t =>
      `<span class="tag-chip sub" title="${escapeHtml(topicLabel(t))}">+บท ${t}</span>`
    ).join('');
    const diffChip = difficulty
      ? `<span class="diff-chip ${diffClass(difficulty)}" title="ระดับความยาก">${difficulty}</span>`
      : '';
    const tagRow = (primaryChips || subChips || diffChip)
      ? `<span class="tag-row">${primaryChips}${subChips}${diffChip}</span>`
      : '';

    // Set prefix — แสดงเฉพาะใน chapter view (เพราะ Q มาจากหลาย set)
    const setPrefix = showSetPrefix
      ? `<span class="set-prefix">${escapeHtml(q.setId)}</span>`
      : '';

    return `
      <details class="q-card${isModified ? ' modified' : ''}">
        <summary>
          ${setPrefix}
          <span class="q-num">Q${String(q.questionNumber).padStart(2,'0')}</span>
          <span class="q-preview">${escapeHtml(preview)}</span>
          ${tagRow}
          <span class="q-badges">
            <span class="badge type">${q.type}</span>
            ${imgBadge}
          </span>
        </summary>
        <div class="q-body">
          ${renderQBody(q)}
        </div>
      </details>
    `;
  }

  // ============ Phase E: [IMAGE] marker support ============
  // Pattern: '[IMAGE]' (single spec) or '[IMAGE:0]', '[IMAGE:1]' ... (array of specs)
  // Two styles supported:
  //   (a) bare line  — line is just the marker → render as standalone block
  //   (b) inline    — marker mixed with text in same line → render SVG inline (span)

  function hasImageMarkers(explanation) {
    if (!Array.isArray(explanation)) return false;
    return explanation.some(ln => typeof ln === 'string' && /\[IMAGE(?::\d+)?\]/.test(ln));
  }

  function _getSpecByIdx(imageSpec, idx) {
    if (Array.isArray(imageSpec)) return imageSpec[idx];
    return idx === 0 ? imageSpec : null;
  }

  function _renderSpecToSvg(spec) {
    if (!spec) return null;
    return (typeof renderImage === 'function') ? renderImage(spec) : null;
  }

  function renderExplanationWithImages(explanation, imageSpec) {
    const out = [];
    explanation.forEach(line => {
      if (typeof line !== 'string') {
        out.push(`<div>${line}</div>`);
        return;
      }

      const re = /\[IMAGE(?::(\d+))?\]/g;
      const parts = [];
      let lastEnd = 0;
      let m;
      let hasMarker = false;
      while ((m = re.exec(line)) !== null) {
        hasMarker = true;
        if (m.index > lastEnd) {
          parts.push({ type: 'text', text: line.substring(lastEnd, m.index) });
        }
        const idx = m[1] !== undefined ? parseInt(m[1], 10) : 0;
        parts.push({ type: 'image', idx });
        lastEnd = m.index + m[0].length;
      }
      if (!hasMarker) {
        out.push(`<div>${line}</div>`);
        return;
      }
      if (lastEnd < line.length) {
        parts.push({ type: 'text', text: line.substring(lastEnd) });
      }

      const isOnlyMarkers = parts.every(p =>
        p.type === 'image' || /^\s*$/.test(p.text)
      );

      if (isOnlyMarkers) {
        // Style (a): standalone block
        parts.forEach(p => {
          if (p.type !== 'image') return;
          const spec = _getSpecByIdx(imageSpec, p.idx);
          const svg = _renderSpecToSvg(spec);
          if (svg) {
            out.push(`<div class="img-inline">${svg}</div>`);
          } else {
            const label = p.idx > 0 ? `[IMAGE:${p.idx}]` : '[IMAGE]';
            out.push(`<div class="img-inline-missing">⚠️ ${label} — ไม่มี imageSpec สำหรับ index นี้</div>`);
          }
        });
      } else {
        // Style (b): inline mix of text + SVG spans
        const html = parts.map(p => {
          if (p.type === 'text') return p.text;
          const spec = _getSpecByIdx(imageSpec, p.idx);
          const svg = _renderSpecToSvg(spec);
          if (svg) return `<span class="img-inline-span">${svg}</span>`;
          const label = p.idx > 0 ? `[IMAGE:${p.idx}]` : '[IMAGE]';
          return `<span class="img-inline-missing">⚠️${label}</span>`;
        }).join('');
        out.push(`<div>${html}</div>`);
      }
    });
    return out.join('');
  }

  function renderQBody(q) {
    let out = '';

    // Phase 3: Edit-tags section at the top of body
    const tags = getEffectiveTags(q);
    const isModified = PENDING_CHANGES.has(q.id);
    const primaryHtml = tags.topics.map(t =>
      `<span class="tag-chip primary" title="${escapeHtml(topicLabel(t))}">บท ${t}: ${escapeHtml(topicLabel(t))}</span>`
    ).join('');
    const subHtml = tags.subTopics.map(t =>
      `<span class="tag-chip sub" title="${escapeHtml(topicLabel(t))}">+บท ${t}: ${escapeHtml(topicLabel(t))}</span>`
    ).join('');
    const diffHtml = tags.difficulty
      ? `<span class="diff-chip ${diffClass(tags.difficulty)}">${tags.difficulty}</span>`
      : '<em style="color:var(--ink-soft)">(ไม่ได้กำหนด)</em>';
    out += `<div class="edit-tags-section">
      <div class="current-tags">
        <span class="label">Tag${isModified ? ' (แก้แล้ว)' : ''}:</span>
        ${primaryHtml || '<em style="color:var(--ink-soft)">(ไม่มี primary)</em>'}
        ${subHtml}
        <span class="label" style="margin-left:14px">ระดับ:</span>
        ${diffHtml}
      </div>
      <button class="edit-tags-btn" onclick="openTagEditor('${escapeHtml(q.id)}')">✏️ แก้ Tag/ระดับ</button>
    </div>`;

    // คำถาม
    out += `<div class="q-section">
      <h4>โจทย์</h4>
      <div class="q-question">${q.question || ''}</div>
    </div>`;

    // tables → render ตารางแจกแจงความถี่ ฯลฯ
    if (Array.isArray(q.tables) && q.tables.length) {
      out += q.tables.map(t => {
        let tbl = '<table class="q-table">';
        if (Array.isArray(t.headers) && t.headers.length) {
          tbl += '<thead><tr>' + t.headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
        }
        if (Array.isArray(t.rows) && t.rows.length) {
          tbl += '<tbody>' + t.rows.map(r =>
            '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>'
          ).join('') + '</tbody>';
        }
        tbl += '</table>';
        return `<div class="q-section">
          <h4>ตาราง</h4>
          ${tbl}
          ${t.caption ? `<div class="table-caption">${t.caption}</div>` : ''}
        </div>`;
      }).join('');
    }

    // imageSpec → render SVG ผ่าน renderers.js (Phase B)
    // Phase E: ถ้า explanation มี [IMAGE] marker → skip section นี้
    //          (SVG จะถูก inject ใน explanation ตรงตำแหน่ง marker)
    //          ถ้าไม่มี marker → fallback แสดง section "รูปประกอบ" แยกเหมือนเดิม (backward compat)
    const explHasImgMarkers = hasImageMarkers(q.explanation);
    if (q.imageSpec && !explHasImgMarkers) {
      const svg = (typeof renderImage === 'function') ? renderImage(q.imageSpec) : null;
      if (svg) {
        // renderer คืน SVG → แสดงในกรอบขาว
        out += `<div class="q-section">
          <h4>รูปประกอบ</h4>
          <div class="img-rendered">${svg}</div>
          ${q.imageNote ? `<div class="imgnote">📝 ${escapeHtml(q.imageNote)}</div>` : ''}
        </div>`;
      } else {
        // type ยังไม่รองรับ → fallback เป็น placeholder card เดิม
        out += `<div class="q-section">
          <h4>รูปประกอบ</h4>
          <div class="imgspec-placeholder">
            <div class="label">imageSpec (renderer ยังไม่รองรับ type นี้)</div>
            <div class="type-pill">type: ${q.imageSpec.type || '(none)'}</div>
            ${q.imageNote ? `<div class="imgnote">📝 ${escapeHtml(q.imageNote)}</div>` : ''}
            <details>
              <summary>ดู JSON ทั้งหมด</summary>
              <pre>${escapeHtml(JSON.stringify(q.imageSpec, null, 2))}</pre>
            </details>
          </div>
        </div>`;
      }
    } else if (q.imageNote && !q.imageSpec) {
      out += `<div class="q-section">
        <h4>รูปประกอบ (เป็น note)</h4>
        <div class="imgnote">${escapeHtml(q.imageNote)}</div>
      </div>`;
    }

    // ตัวเลือก
    if (q.type === 'mc' && Array.isArray(q.choices)) {
      out += `<div class="q-section">
        <h4>ตัวเลือก</h4>
        <ol class="choices">
          ${q.choices.map((c, i) =>
            `<li class="${i === q.correct ? 'correct' : ''}">${c}</li>`
          ).join('')}
        </ol>
      </div>`;
    } else if (q.type === 'fill') {
      out += `<div class="q-section">
        <h4>คำตอบ</h4>
        <span class="correct-fill">${q.correct}</span>
        ${Array.isArray(q.accept) && q.accept.length > 1
          ? ` <span style="font-size:12px;color:var(--ink-soft)">(รับ: ${q.accept.join(', ')})</span>` : ''}
      </div>`;
    }

    // เฉลย
    if (Array.isArray(q.explanation) && q.explanation.length) {
      // Phase E: ถ้ามี [IMAGE] marker → inject SVG inline; ไม่มี → render ตรงๆ
      const explHtml = (explHasImgMarkers && q.imageSpec)
        ? renderExplanationWithImages(q.explanation, q.imageSpec)
        : q.explanation.map(line => `<div>${line}</div>`).join('');
      out += `<div class="q-section">
        <h4>เฉลย</h4>
        <div class="explanation">
          ${explHtml}
        </div>
      </div>`;
    }

    return out;
  }

  // ============ Phase 3: Tag editor functions ============

  function openTagEditor(qid) {
    const q = findQuestionById(qid);
    if (!q) {
      alert('ไม่พบข้อ ' + qid);
      return;
    }

    EDITING_QID = qid;
    const tags = getEffectiveTags(q);
    EDITING_PRIMARY = new Set(tags.topics);
    EDITING_SUB = new Set(tags.subTopics);
    EDITING_DIFFICULTY = tags.difficulty || null;

    document.getElementById('tagEditQid').textContent = qid;
    document.getElementById('tagEditQuestion').innerHTML = q.question || '<em>(no question text)</em>';

    renderTagSelectors();
    document.getElementById('tagEditModal').hidden = false;

    // KaTeX render preview
    typeset(document.getElementById('tagEditQuestion'));
  }

  function closeTagEditor() {
    document.getElementById('tagEditModal').hidden = true;
    EDITING_QID = null;
  }

  // Keyboard: Esc to close, Enter to save
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('tagEditModal').hidden) return;
    if (e.key === 'Escape') closeTagEditor();
    else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveTagEditor();
  });

  function renderTagSelectors() {
    const topicNames = (MANIFEST && MANIFEST.topicNames) || {};
    const chapterIds = Object.keys(topicNames).sort((a, b) => Number(a) - Number(b));

    const primaryHtml = chapterIds.map(chId => {
      const selected = EDITING_PRIMARY.has(chId);
      const isSecondary = EDITING_SUB.has(chId);
      const reachedLimit = !selected && EDITING_PRIMARY.size >= 2;
      const disabled = (!selected && (isSecondary || reachedLimit));
      const cls = 'tag-toggle primary' + (selected ? ' selected' : '');
      return `<button class="${cls}" ${disabled ? 'disabled' : ''}
        onclick="togglePrimary('${chId}')"
        title="${escapeHtml(topicNames[chId])}">บท ${chId}: ${escapeHtml(topicNames[chId])}</button>`;
    }).join('');

    const secondaryHtml = chapterIds.map(chId => {
      const selected = EDITING_SUB.has(chId);
      const isPrimary = EDITING_PRIMARY.has(chId);
      const disabled = !selected && isPrimary;
      const cls = 'tag-toggle sub' + (selected ? ' selected' : '');
      return `<button class="${cls}" ${disabled ? 'disabled' : ''}
        onclick="toggleSecondary('${chId}')"
        title="${escapeHtml(topicNames[chId])}">บท ${chId}: ${escapeHtml(topicNames[chId])}</button>`;
    }).join('');

    document.getElementById('primarySelector').innerHTML = primaryHtml;
    document.getElementById('secondarySelector').innerHTML = secondaryHtml;

    // Phase 4: Difficulty selector (3 toggleable buttons)
    const diffHtml = DIFF_LEVELS.map(d => {
      const selected = EDITING_DIFFICULTY === d.key;
      // Reuse tag-toggle styling but apply difficulty colors via diff-chip approach
      const cls = selected
        ? `tag-toggle selected diff-chip ${d.cls}`
        : `tag-toggle`;
      return `<button class="${cls}" onclick="setDifficulty('${d.key}')">${d.key}</button>`;
    }).join('') +
      `<button class="tag-toggle${EDITING_DIFFICULTY === null ? ' selected' : ''}"
        onclick="setDifficulty(null)" title="ลบระดับ">— ไม่กำหนด —</button>`;
    document.getElementById('difficultySelector').innerHTML = diffHtml;

    // Disable save if primary is empty
    document.getElementById('tagEditSaveBtn').disabled = EDITING_PRIMARY.size === 0;
  }

  function setDifficulty(level) {
    EDITING_DIFFICULTY = level;  // 'ง่าย'|'ปานกลาง'|'ยาก'|null
    renderTagSelectors();
  }

  function togglePrimary(chId) {
    if (EDITING_PRIMARY.has(chId)) {
      EDITING_PRIMARY.delete(chId);
    } else {
      if (EDITING_PRIMARY.size >= 2) return;
      EDITING_PRIMARY.add(chId);
      EDITING_SUB.delete(chId);  // mutual exclusion
    }
    renderTagSelectors();
  }

  function toggleSecondary(chId) {
    if (EDITING_SUB.has(chId)) {
      EDITING_SUB.delete(chId);
    } else {
      if (EDITING_PRIMARY.has(chId)) return;  // can't be both
      EDITING_SUB.add(chId);
    }
    renderTagSelectors();
  }

  function saveTagEditor() {
    if (!EDITING_QID) return;
    if (EDITING_PRIMARY.size === 0) {
      alert('ต้องมี primary tag อย่างน้อย 1 บท');
      return;
    }

    const q = findQuestionById(EDITING_QID);
    if (!q) return;

    const newTopics = Array.from(EDITING_PRIMARY).sort((a, b) => Number(a) - Number(b));
    const newSubTopics = Array.from(EDITING_SUB).sort((a, b) => Number(a) - Number(b));
    const newDifficulty = EDITING_DIFFICULTY;
    const origTopics = q.topics || [];
    const origSubTopics = q.subTopics || [];
    const origDifficulty = q.difficulty || null;

    const topicsSame = JSON.stringify(newTopics) === JSON.stringify(origTopics);
    const subSame = JSON.stringify(newSubTopics) === JSON.stringify(origSubTopics);
    const diffSame = newDifficulty === origDifficulty;

    if (topicsSame && subSame && diffSame) {
      // No real change → ensure not in pending
      PENDING_CHANGES.delete(EDITING_QID);
    } else {
      PENDING_CHANGES.set(EDITING_QID, {
        topics: newTopics,
        subTopics: newSubTopics,
        difficulty: newDifficulty,
      });
    }

    savePendingToStorage();
    closeTagEditor();
    updateExportBar();
    refreshCurrentView();
  }

  function refreshCurrentView() {
    // Re-render current view + sidebar counts
    if (CURRENT_CHAPTER) {
      selectChapter(CURRENT_CHAPTER);
    } else if (CURRENT_DIFFICULTY) {
      selectDifficulty(CURRENT_DIFFICULTY);
    } else if (CURRENT_SET) {
      selectSet(CURRENT_SET);
    }
    if (ALL_LOADED) {
      updateChapterCounts();
      updateDifficultyCounts();
    }
  }

  function updateExportBar() {
    const bar = document.getElementById('exportBar');
    const count = PENDING_CHANGES.size;
    if (count === 0) {
      bar.hidden = true;
    } else {
      bar.hidden = false;
      document.getElementById('changeCount').textContent = count;
    }
  }

  function discardAllChanges() {
    if (PENDING_CHANGES.size === 0) return;
    if (!confirm(`ยกเลิกการแก้ทั้งหมด ${PENDING_CHANGES.size} ข้อ?`)) return;
    PENDING_CHANGES.clear();
    savePendingToStorage();
    updateExportBar();
    refreshCurrentView();
  }

  function exportChanges() {
    if (PENDING_CHANGES.size === 0) return;

    const changes = [];
    PENDING_CHANGES.forEach((tags, qid) => {
      const origQ = findQuestionById(qid);
      changes.push({
        id: qid,
        previousTopics: origQ ? (origQ.topics || []) : [],
        previousSubTopics: origQ ? (origQ.subTopics || []) : [],
        previousDifficulty: origQ ? (origQ.difficulty || null) : null,
        newTopics: tags.topics,
        newSubTopics: tags.subTopics,
        newDifficulty: tags.difficulty !== undefined ? tags.difficulty : null,
      });
    });
    changes.sort((a, b) => a.id.localeCompare(b.id));

    const payload = {
      exported: new Date().toISOString(),
      schemaVersion: (MANIFEST && MANIFEST.schemaVersion) || '3.0',
      changeCount: changes.length,
      changes,
    };

    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');
    a.download = `tag-changes-${yyyy}-${mm}-${dd}-${hh}${mi}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Warn before tab close if there are pending changes that haven't been exported
  window.addEventListener('beforeunload', (e) => {
    if (PENDING_CHANGES.size > 0) {
      // Note: localStorage จะเก็บไว้ — แต่ warning ช่วยกัน user ลืม export
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // ============ Helpers ============
  // Build display label for a set.
  // - Exam sets (have year): use examDate if real date, else source+year+month
  // - Chapter sets (no year, has subject): source + subject (e.g. 'ข้อสอบรายบทตรรกศาสตร์')
  function setLabel(s) {
    if (!s) return '(no set)';
    // Custom display name (set by teacher in manifest) takes priority
    if (s.displayName) {
      return s.displayName;
    }
    // Chapter set: no year, but has subject → 'source + subject'
    if (!s.year && s.subject && s.source) {
      return `${s.source}${s.subject}`;
    }
    // Exam set with real-date examDate
    if (s.examDate && looksLikeDate(s.examDate)) {
      return s.examDate;
    }
    // Exam set fallback
    return `${s.source || ''} ${s.year || ''}${s.month ? ' · เดือน ' + s.month : ''}`.trim();
  }

  // Heuristic: examDate is a real date if it contains digits (year/day)
  function looksLikeDate(str) {
    return typeof str === 'string' && /\d{2,4}/.test(str);
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function typeset(root) {
    if (window.renderMathInElement) {
      renderMathInElement(root, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$',  right: '$',  display: false },
          { left: '\\(', right: '\\)', display: false },
          { left: '\\[', right: '\\]', display: true }
        ],
        throwOnError: false
      });
    }
  }
</script>
